kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

# Chat UI + API (matches deployment). Keeps artifact run to `dev:serve` only.
[services.development.build]
args = ["npm", "run", "build:replit-artifact"]

[services.development.build.env]
NODE_ENV = "production"

[services.development]
run = "npm run -w @workspace/api-server dev:serve"

[services.production.build]
args = ["npm", "run", "build:replit-artifact"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
